<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1e2a4a" />
  <title>MediVoice – Offline</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192x192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e2a4a;
      --card: #243060;
      --accent: #4a8eff;
      --fg: #f0f4ff;
      --muted: #7b8ab8;
      --radius: 16px;
    }

    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: var(--radius);
      background: var(--card);
      display: grid;
      place-items: center;
      margin-bottom: 1.75rem;
      box-shadow: 0 0 0 1px rgba(74,142,255,.25);
    }

    .logo svg {
      width: 40px;
      height: 40px;
    }

    h1 {
      font-size: clamp(1.4rem, 5vw, 1.8rem);
      font-weight: 700;
      letter-spacing: -.02em;
      margin-bottom: .5rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: .95rem;
      max-width: 340px;
      line-height: 1.55;
    }

    .card {
      margin-top: 2rem;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      max-width: 360px;
      width: 100%;
      text-align: left;
    }

    .card h2 {
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .75rem;
    }

    .tips li {
      list-style: none;
      font-size: .875rem;
      color: var(--fg);
      padding: .45rem 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .tips li:last-child { border-bottom: none; }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .actions {
      margin-top: 1.75rem;
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    button, a.btn {
      padding: .65rem 1.5rem;
      border-radius: .5rem;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .15s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }

    button:hover, a.btn:hover { opacity: .85; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,.15);
    }

    .status {
      margin-top: 2rem;
      font-size: .75rem;
      color: var(--muted);
    }

    .status span#online-badge {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e53e3e;
      flex-shrink: 0;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .pulse { animation: blink 1.4s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="logo">
    <!-- Medical cross + voice wave icon -->
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Cross -->
      <rect x="16" y="6"  width="8" height="28" rx="2" fill="#4a8eff"/>
      <rect x="6"  y="16" width="28" height="8"  rx="2" fill="#4a8eff"/>
      <!-- Mic dot -->
      <circle cx="20" cy="34" r="2.5" fill="#f0f4ff"/>
    </svg>
  </div>

  <h1>You're offline</h1>
  <p class="subtitle">
    MediVoice needs a connection to chat with Maya and manage appointments.
  </p>

  <div class="card">
    <h2>Try these steps</h2>
    <ul class="tips">
      <li><span class="dot"></span>Check your Wi-Fi or mobile data</li>
      <li><span class="dot"></span>Move to a better signal area</li>
      <li><span class="dot"></span>Disable Airplane mode if enabled</li>
      <li><span class="dot"></span>Restart your router or browser</li>
    </ul>
  </div>

  <div class="actions">
    <button class="btn-primary" onclick="retryConnection()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
      Try again
    </button>
    <a class="btn btn-ghost" href="/">Go home</a>
  </div>

  <p class="status">
    <span id="online-badge">
      <span class="pulse"></span>
      <span id="status-text">No internet connection</span>
    </span>
  </p>

  <script>
    function retryConnection() {
      window.location.reload();
    }

    function updateStatus() {
      const badge = document.getElementById('online-badge');
      const text  = document.getElementById('status-text');
      const dot   = badge.querySelector('.pulse');
      if (navigator.onLine) {
        dot.style.background   = '#48bb78';
        dot.style.animation    = 'none';
        text.textContent       = 'Connection restored — reloading…';
        setTimeout(() => window.location.href = '/', 1200);
      } else {
        dot.style.background   = '#e53e3e';
        dot.style.animation    = 'blink 1.4s ease-in-out infinite';
        text.textContent       = 'No internet connection';
      }
    }

    window.addEventListener('online',  updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
